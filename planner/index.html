<!DOCTYPE html>

    <title>Calendario Tarefa</title>
    <link rel="stylesheet" href="https://unpkg.com/mvp.css"> 
    <style>
    table { 
        border-collapse: collapse; 
        width: 100%; 
        table-layout: fixed;
        margin: 0;
    }
    th {
        width: 13%;
    }
    th:first-child {
        width: 90px;
    }
    th, td { 
        border: 1px solid #696969; 
        padding: 5px; 
    }
    tbody td {
        height: 100px;
        padding: 5px; 
        text-align: right;
        vertical-align: top;
    }
    .task {
        font-size: 13px;
        text-align: left;
        font-family: 'Courier New', Courier, monospace;
        white-space: pre-line; 
        word-break: break-word; 
        overflow-wrap: break-word;
    }
    .container {
        display: flex;
        gap: 20px;
        max-width: 1200px;
        margin: 20px auto;
        align-items: stretch; 
    }
    .calendar-div {
        flex: 3;
    }
    .side-container {
        flex: 1; 
        border: 3px solid rgb(30, 191, 212);
        border-radius: 5px;
        padding: 15px;
        font-family: 'Courier New', Courier, monospace;
        background-color: white;
    }
    .side-container h2 {
        margin-top: 0;
        color: black;
    }
    </style>
</head>
